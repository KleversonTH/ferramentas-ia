<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; color: #e8e8f0; }
    .card { background: #13131a; border: 1px solid #1e1e2e; border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; }
    h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666680; margin-bottom: 1.5rem; }
    label { font-size: 12px; color: #555570; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    input { width: 100%; padding: 12px 14px; font-size: 14px; border: 1px solid #1e1e2e; border-radius: 10px; background: #0d0d14; color: #c8c8e0; font-family: 'Space Grotesk', sans-serif; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #6347ff; }
    button { width: 100%; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 10px; border: none; background: linear-gradient(135deg, #6347ff, #9b64ff); color: #fff; cursor: pointer; font-family: 'Space Grotesk', sans-serif; margin-top: 0.5rem; }
    button:hover { opacity: 0.9; }
    .erro { display: none; background: rgba(200,50,50,0.08); border: 1px solid rgba(200,50,50,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff6b6b; margin-top: 1rem; }
    .sucesso { display: none; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #86efac; margin-top: 1rem; }
    .toggle { text-align: center; margin-top: 1rem; font-size: 13px; color: #555570; }
    .toggle a { color: #a08fff; cursor: pointer; text-decoration: none; }
    .toggle a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h1 id="titulo">Entrar</h1>
  <p class="subtitle" id="subtitulo">Acesse sua conta para usar as ferramentas</p>

  <div id="campo-nome" style="display:none;">
    <label>Nome</label>
    <input type="text" id="nome" placeholder="Seu nome completo" />
  </div>

  <label>Email</label>
  <input type="email" id="email" placeholder="seu@email.com" />

  <label>Senha</label>
  <input type="password" id="senha" placeholder="••••••••" />

  <button onclick="enviar()">Entrar</button>

  <div class="erro" id="erro"></div>
  <div class="sucesso" id="sucesso"></div>

  <div class="toggle">
    <span id="toggle-texto">Não tem conta? </span>
    <a onclick="alternarModo()">Cadastrar</a>
  </div>
</div>

<script>
  const BASE_URL = 'https://ferramentas-ia-production.up.railway.app';
  let modo = 'login';

  function alternarModo() {
    modo = modo === 'login' ? 'cadastro' : 'login';
    document.getElementById('titulo').textContent = modo === 'login' ? 'Entrar' : 'Criar conta';
    document.getElementById('subtitulo').textContent = modo === 'login' ? 'Acesse sua conta para usar as ferramentas' : 'Crie sua conta gratuitamente';
    document.getElementById('campo-nome').style.display = modo === 'cadastro' ? 'block' : 'none';
    document.querySelector('button').textContent = modo === 'login' ? 'Entrar' : 'Cadastrar';
    document.getElementById('toggle-texto').textContent = modo === 'login' ? 'Não tem conta? ' : 'Já tem conta? ';
    document.querySelector('.toggle a').textContent = modo === 'login' ? 'Cadastrar' : 'Entrar';
    document.getElementById('erro').style.display = 'none';
    document.getElementById('sucesso').style.display = 'none';
  }

  async function enviar() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value.trim();
    const nome = document.getElementById('nome').value.trim();

    if (!email || !senha) { mostrarErro('Preencha todos os campos.'); return; }
    if (modo === 'cadastro' && !nome) { mostrarErro('Digite seu nome.'); return; }

    const url = modo === 'login' ? `${BASE_URL}/login` : `${BASE_URL}/cadastro`;
    const body = modo === 'login' ? { email, senha } : { nome, email, senha };

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!data.sucesso) { mostrarErro(data.mensagem); return; }

      if (modo === 'login') {
        if (!data.ativo) {
        mostrarErro('Conta não ativada. Aguarde a ativação após o pagamento.');
        return;
}
        localStorage.setItem('token', data.token);
        const params = new URLSearchParams(window.location.search);
        if (params.get('plano') === 'pro') {
          mostrarSucesso('Login realizado! Redirecionando para pagamento...');
          const resp = await fetch('https://ferramentas-ia-production.up.railway.app/criar-pagamento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const pagamento = await resp.json();
          if (pagamento.sucesso) {
            setTimeout(() => window.location.href = pagamento.url, 1500);
          }
        } else {
          mostrarSucesso('Login realizado! Redirecionando...');
          setTimeout(() => window.location.href = 'ferramenta.html', 1500);
        }
      } else {
        mostrarSucesso('Cadastro realizado! Aguarde a ativação da sua conta.');
      }

    } catch (e) {
      mostrarErro('Erro de conexão. Verifique se o servidor está rodando.');
    }
  }

  function mostrarErro(msg) {
    document.getElementById('erro').textContent = msg;
    document.getElementById('erro').style.display = 'block';
    document.getElementById('sucesso').style.display = 'none';
  }

  function mostrarSucesso(msg) {
    document.getElementById('sucesso').textContent = msg;
    document.getElementById('sucesso').style.display = 'block';
    document.getElementById('erro').style.display = 'none';
  }
</script>
</body>
</html>
