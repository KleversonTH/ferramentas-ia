<!DOCTYPE html>
<html lang="pt-BR">

    .emoji { font-size: 60px; margin-bottom: 1rem; }
    h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    p { font-size: 14px; color: #666680; margin-bottom: 2rem; line-height: 1.6; }
    a { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #facc15, #f97316); color: #0a0a0f; font-weight: 600; border-radius: 10px; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">⏳</div>
    <h1>Pagamento em análise</h1>
